name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Frontend And Host Regression
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install frontend dependencies
        working-directory: frontend
        shell: powershell
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        shell: powershell
        run: npm test

      - name: Build frontend
        working-directory: frontend
        shell: powershell
        run: npm run build

      - name: Build backend (Debug)
        shell: powershell
        run: dotnet build ToolHub.App/ToolHub.App.csproj -c Debug

      - name: Run host regression checks
        shell: powershell
        run: dotnet test ToolHub.App.Tests/ToolHub.App.Tests.csproj -c Debug
